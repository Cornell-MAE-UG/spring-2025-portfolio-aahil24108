---
layout: default
---

<article class="project-page">

  <h1>{{ page.title }}</h1>

  {% if page.image %}
    <img src="{{ page.image | relative_url }}" alt="{{ page.title }}" class="project-hero-image">
  {% endif %}

  <div class="project-content">
    {{ content }}
  </div>

  <p class="back-link">
    <a href="{{ '/projects/' | relative_url }}">← Back to Projects</a>
  </p>

</article>
